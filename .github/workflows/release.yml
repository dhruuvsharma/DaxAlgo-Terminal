name: Release

# Publishes a self-contained Windows build and attaches the zip to a GitHub Release
# whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0). Defaults to the tag.'
        required: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($v)) {
            $v = "${{ github.ref_name }}" -replace '^v', ''
          }
          if ([string]::IsNullOrWhiteSpace($v)) { $v = "1.0.0" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Building version $v"

      - name: Publish app (self-contained win-x64)
        run: >
          dotnet publish src/TradingTerminal.App/TradingTerminal.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/DaxAlgo-Terminal

      - name: Publish backtest CLI (self-contained win-x64)
        run: >
          dotnet publish src/TradingTerminal.Backtest.Cli/TradingTerminal.Backtest.Cli.csproj
          -c Release -r win-x64 --self-contained true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/DaxAlgo-Terminal/cli

      - name: Stage release docs
        shell: pwsh
        run: Copy-Item README.md, CHANGELOG.md, LICENSE publish/DaxAlgo-Terminal -Force

      - name: Zip (portable)
        shell: pwsh
        run: |
          $name = "DaxAlgo-Terminal-v${{ steps.ver.outputs.version }}-win-x64.zip"
          Compress-Archive -Path publish/DaxAlgo-Terminal/* -DestinationPath $name -Force
          "asset=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        id: zip

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
                  "/DMySourceDir=$(Resolve-Path publish/DaxAlgo-Terminal)" `
                  installer/DaxAlgoTerminal.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)." }
          $setup = "installer/Output/DaxAlgo-Terminal-Setup-v${{ steps.ver.outputs.version }}.exe"
          "setup=$setup" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        id: installer

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DaxAlgo Terminal v${{ steps.ver.outputs.version }}
          body_path: CHANGELOG.md
          draft: true
          files: |
            ${{ steps.zip.outputs.asset }}
            ${{ steps.installer.outputs.setup }}
