name: Release

# Publishes a self-contained Windows build and attaches the zip to a GitHub Release
# whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0). Defaults to the tag.'
        required: false

permissions:
  contents: write

# Opt JS-based actions into Node 24 now (silences the Node 20 deprecation warnings).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($v)) {
            $v = "${{ github.ref_name }}" -replace '^v', ''
          }
          if ([string]::IsNullOrWhiteSpace($v)) { $v = "1.0.0" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Building version $v"

      - name: Publish Intermediate edition (self-contained win-x64)
        run: >
          dotnet publish src/windows/Shell/TradingTerminal.App.Intermediate/TradingTerminal.App.Intermediate.csproj
          -c Release -r win-x64 --self-contained true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/DaxAlgo-Terminal-Intermediate

      - name: Publish Basic edition (self-contained win-x64)
        run: >
          dotnet publish src/windows/Shell/TradingTerminal.App.Basic/TradingTerminal.App.Basic.csproj
          -c Release -r win-x64 --self-contained true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/DaxAlgo-Terminal-Basic

      - name: Stage verified native QuestDB runtime
        shell: pwsh
        run: |
          ./scripts/stage-questdb.ps1 -Destination @(
            'publish/DaxAlgo-Terminal-Intermediate/questdb',
            'publish/DaxAlgo-Terminal-Basic/questdb'
          )

      - name: Stage release docs
        shell: pwsh
        run: |
          Copy-Item README.md, CHANGELOG.md, LICENSE publish/DaxAlgo-Terminal-Intermediate -Force
          Copy-Item README.md, CHANGELOG.md, LICENSE publish/DaxAlgo-Terminal-Basic -Force

      - name: Zip (portable)
        shell: pwsh
        run: |
          $inter = "DaxAlgo-Terminal-Intermediate-v${{ steps.ver.outputs.version }}-win-x64.zip"
          $basic = "DaxAlgo-Terminal-Basic-v${{ steps.ver.outputs.version }}-win-x64.zip"
          Compress-Archive -Path publish/DaxAlgo-Terminal-Intermediate/* -DestinationPath $inter -Force
          Compress-Archive -Path publish/DaxAlgo-Terminal-Basic/* -DestinationPath $basic -Force
          "inter=$inter" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "basic=$basic" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        id: zip

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DaxAlgo Terminal v${{ steps.ver.outputs.version }}
          body_path: CHANGELOG.md
          draft: true
          files: |
            ${{ steps.zip.outputs.inter }}
            ${{ steps.zip.outputs.basic }}
