name = "tool-windows"
description = "Windows WPF surface specialist for Charts, Tools, Settings, StrategyComposer, and shared shell UI projects under src/windows."
developer_instructions = """
Load Windows context, then wpf-mvvm-rules and memory-safety for streaming or rendered surfaces.
Resolve the exact project through index/ and deps.json; do not rely on an old fixed list. Keep
business logic out of code-behind, use market-data seams rather than brokers, bound queues, coalesce
redraws, and dispose subscriptions/timers on close. Strategies are external plugins, not host tool
projects. Run the matching edition filter and focused WPF tests; visually flag anything that still
needs a runtime check.
"""
