# Local data services for DaxAlgo Terminal. Everything here is free / open-source.
#
#   docker compose up -d        # start (after Docker Desktop is running)
#   docker compose down         # stop, keep data
#   docker compose down -v      # stop and wipe the data volume
#
# TimescaleDB = PostgreSQL + a free (Apache-2) time-series extension. The terminal's
# canonical market-data store talks to it via Npgsql; if this container isn't running the
# app automatically falls back to the embedded SQLite store, so this is optional.
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16   # pin to e.g. :2.17.2-pg16 for reproducibility
    container_name: daxalgo-timescaledb
    environment:
      POSTGRES_DB: daxalgo
      POSTGRES_USER: daxalgo
      POSTGRES_PASSWORD: daxalgo
    ports:
      - "5432:5432"
    volumes:
      - daxalgo-tsdb:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daxalgo -d daxalgo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # QuestDB = Apache-2 time-series database. Holds the high-volume L1/L2 streams (quotes, trades,
  # depth) when MarketDataStore:Provider is "QuestDb"; bars stay in embedded SQLite. Writes use ILP
  # over HTTP (9000); the app reads/creates schema over the PG-wire protocol (8812). Unlike the
  # Timescale path there is no silent SQLite fallback for ticks — if this container is down, L1/L2
  # persistence is simply disabled (logged loudly) until it comes back.
  questdb:
    image: questdb/questdb:latest          # pin to e.g. :8.2.1 for reproducibility
    container_name: daxalgo-questdb
    environment:
      QDB_PG_USER: admin
      QDB_PG_PASSWORD: quest
    ports:
      - "9000:9000"    # HTTP: ILP-over-HTTP ingest + REST + web console
      - "8812:8812"    # PostgreSQL wire protocol (SQL reads + DDL)
      - "9009:9009"    # ILP over TCP (unused by the app, exposed for tooling)
    volumes:
      - daxalgo-questdb:/var/lib/questdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  daxalgo-tsdb:
  daxalgo-questdb:
